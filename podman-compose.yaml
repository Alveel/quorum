services:
  db:
    image: dhi.io/postgres:18-alpine3.22
    environment:
      POSTGRES_USER: vacation
      POSTGRES_PASSWORD: vacation
      POSTGRES_DB: vacation
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacation"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
