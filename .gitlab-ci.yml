stages:
  - verify
  - release

variables:
  # -- image tags --
  # renovate: datasource=docker depName=registry.access.redhat.com/hi/go
  GO_BUILDER_TAG: "1.26-builder"
  # renovate: datasource=docker depName=registry.access.redhat.com/ubi10/ubi-micro
  UBI_TAG: "10.2-1779859609"
  # renovate: datasource=docker depName=golangci/golangci-lint
  GOLANGCI_TAG: "v2.12.2"
  # renovate: datasource=docker depName=alpine/helm
  HELM_TAG: "4.2.1"
  # renovate: datasource=docker depName=quay.io/containers/buildah
  BUILDAH_TAG: "v1.43.1"
  # renovate: datasource=docker depName=renovate/renovate
  RENOVATE_TAG: "43.227-full"
  # -- images (all pulled from Nexus) --
  GO_IMAGE: "${NEXUS_REGISTRY}/hi/go:${GO_BUILDER_TAG}"
  UBI_IMAGE: "${NEXUS_REGISTRY}/ubi10/ubi-micro:${UBI_TAG}"
  GOLANGCI_IMAGE: "${NEXUS_REGISTRY}/golangci/golangci-lint:${GOLANGCI_TAG}"
  HELM_IMAGE: "${NEXUS_REGISTRY}/alpine/helm:${HELM_TAG}"
  BUILDAH_IMAGE: "${NEXUS_REGISTRY}/buildah/stable:${BUILDAH_TAG}"
  RENOVATE_IMAGE: "${NEXUS_REGISTRY}/renovate/renovate:${RENOVATE_TAG}"
  # -- app image --
  APP_IMAGE: "${NEXUS_REGISTRY}/quorum"
  # -- Go --
  GOPATH: "$CI_PROJECT_DIR/.cache/go"
  GOPROXY: "https://${NEXUS_REGISTRY}/repository/go-proxy,direct"
  GONOSUMDB: "*"
  # -- npm --
  NPM_REPOSITORY: "npm-proxy"
  # -- buildah --
  STORAGE_DRIVER: vfs
  BUILDAH_FORMAT: docker

# ── verify ──────────────────────────────────────────────────────────────────

commit-lint:
  stage: verify
  image: "$GO_IMAGE"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - |
      echo "$CI_MERGE_REQUEST_TITLE" \
        | grep -qE '^(feat|fix|chore|docs|style|refactor|test|build|ci|perf|revert)(\([^)]+\))?!?: .+' \
        || { echo "MR title must follow Conventional Commits: https://www.conventionalcommits.org"; exit 1; }

test:
  stage: verify
  image: "$GO_IMAGE"
  cache:
    key:
      files: [go.sum]
    paths: [.cache/go/pkg/mod]
  rules:
    - changes:
        - "**/*.go"
        - go.mod
        - go.sum
        - "**/*.templ"
        - Containerfile
        - Makefile
        - "migrations/**"
        - "web/**"
      when: always
    - when: never
  script:
    - TEMPL_VERSION=$(grep 'github.com/a-h/templ' go.mod | awk '{print $2}')
    - go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}
    - make templ && git diff --exit-code
    - make test
    - make build

lint:
  stage: verify
  image: "$GOLANGCI_IMAGE"
  cache:
    key:
      files: [go.sum]
    paths: [.cache/go/pkg/mod]
  rules:
    - changes:
        - "**/*.go"
        - go.mod
        - go.sum
      when: always
    - when: never
  script:
    - make lint

helm-lint:
  stage: verify
  image: "$HELM_IMAGE"
  rules:
    - when: always
  script:
    - make helm-lint

# ── release ─────────────────────────────────────────────────────────────────

build-image:
  stage: release
  image: "$BUILDAH_IMAGE"
  needs: [test, lint, helm-lint]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      when: always
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "**/*.go"
        - go.mod
        - go.sum
        - "**/*.templ"
        - Containerfile
        - Makefile
        - "migrations/**"
        - "web/**"
      when: always
    - when: never
  before_script:
    - buildah login --username "$NEXUS_USER" --password "$NEXUS_PASSWORD" "$NEXUS_REGISTRY"
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG1="${APP_IMAGE}:${CI_COMMIT_TAG}"
        TAG2="${APP_IMAGE}:${CI_COMMIT_TAG#v}"
      else
        TAG1="${APP_IMAGE}:${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
        TAG2="${APP_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      fi
      buildah build \
        --storage-driver=$STORAGE_DRIVER \
        --layers \
        --build-arg GO_IMAGE=${GO_IMAGE} \
        --build-arg UBI_IMAGE=${UBI_IMAGE} \
        --tag "$TAG1" \
        --tag "$TAG2" \
        -f Containerfile .
      buildah push --storage-driver=$STORAGE_DRIVER "$TAG1"
      buildah push --storage-driver=$STORAGE_DRIVER "$TAG2"

publish-chart:
  stage: release
  image: "$HELM_IMAGE"
  needs: [helm-lint]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "deploy/helm/**"
      when: always
    - when: never
  script:
    - |
      CHART_VERSION=$(grep '^version:' deploy/helm/quorum/Chart.yaml | awk '{print $2}')
      if curl -sf -u "${NEXUS_USER}:${NEXUS_PASSWORD}" \
          "${NEXUS_HELM_URL}/quorum-${CHART_VERSION}.tgz" > /dev/null 2>&1; then
        echo "Chart version ${CHART_VERSION} already exists. Bump version in Chart.yaml."
        exit 1
      fi
      helm package deploy/helm/quorum
      curl -u "${NEXUS_USER}:${NEXUS_PASSWORD}" \
        --upload-file quorum-${CHART_VERSION}.tgz \
        "${NEXUS_HELM_URL}/quorum-${CHART_VERSION}.tgz"

# ── renovate (scheduled only) ────────────────────────────────────────────────

renovate:
  stage: verify
  image: "$RENOVATE_IMAGE"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  variables:
    RENOVATE_HOST_RULES: >-
      [{"matchHost":"${NEXUS_REGISTRY}","username":"${NEXUS_USER}","password":"${NEXUS_PASSWORD}"}]
    npm_config_registry: "https://${NEXUS_REGISTRY}/repository/$NPM_REPOSITORY/"
  script:
    - renovate
        --platform=gitlab
        --endpoint="${CI_SERVER_URL}/api/v4"
        --token="$RENOVATE_GITLAB_TOKEN"
        "$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME"
