apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "quorum.fullname" . }}
  labels:
    {{- include "quorum.labels" . | nindent 4 }}
data:
  TEAM_SIZE: {{ .Values.team.size | quote }}
  MIN_PRESENT_DEFAULT: {{ .Values.threshold.minPresentDefault | quote }}
  ADMIN_GROUPS: {{ .Values.admin.groups | join "," | quote }}
  PORT: "8080"
