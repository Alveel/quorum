apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "quorum.fullname" . }}
  labels:
    {{- include "quorum.labels" . | nindent 4 }}
  {{- if eq .Values.proxy.provider "openshift" }}
  annotations:
    {{- if eq .Values.ingress.type "route" }}
    # Dynamic redirect: OpenShift resolves the Route hostname automatically.
    serviceaccounts.openshift.io/oauth-redirectreference.primary: >-
      {"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"{{ include "quorum.fullname" . }}"}}
    {{- else }}
    # Static redirect URI for GatewayAPI / HTTPRoute ingress.
    serviceaccounts.openshift.io/oauth-redirecturi.primary: >-
      https://{{ required ".Values.ingress.host required when ingress.type=httproute" .Values.ingress.host }}/oauth/callback
    {{- end }}
  {{- end }}
