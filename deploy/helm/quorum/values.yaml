image:
  repository: ghcr.io/alveel/quorum
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Existing Secret holding the Postgres connection string for this app.
# Rename if a DB operator already created a secret with a similar name.
# When database.tlsCA.enabled=true, set sslmode=verify-full in DATABASE_URL.
# Do not include sslrootcert= in the URL — PGSSLROOTCERT is injected automatically
# from the mounted cert.
database:
  secretName: quorum-db-url
  secretKey: DATABASE_URL
  tlsCA:
    enabled: false
    secretName: ""     # e.g. quorum-db-tls-ca — mutually exclusive with configMapName
    configMapName: ""  # e.g. cert-manager trust bundle ConfigMap — mutually exclusive with secretName
    key: ca.crt        # key within the Secret or ConfigMap (trust-manager may use ca-bundle.crt)

ingress:
  type: route          # route | httproute
  host: ""             # required for httproute; optional for route (OpenShift assigns one)
  # httproute only: reference to an existing Gateway
  gatewayRef:
    name: ""
    namespace: ""
    sectionName: ""    # optional

proxy:
  provider: openshift  # openshift | oidc
  # Shared cookie secret (both providers).
  cookieSecret:
    secretName: quorum-oauth-cookie
    secretKey: cookie-secret
  openshift:
    # Community build (OKD), no pull secret required.
    # Licensed build: registry.redhat.io/openshift4/ose-oauth-proxy:v4.14 (requires pull secret).
    image: quay.io/openshift/origin-oauth-proxy:4.22
  oidc:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
    issuerURL: ""
    clientID: ""
    clientSecret:
      secretName: ""
      secretKey: client-secret
    emailDomain: "*"

# OpenShift groups whose members are granted admin in the app.
admin:
  groups: []

team:
  size: 15

threshold:
  minPresentDefault: 8

resources:
  app:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  proxy:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
