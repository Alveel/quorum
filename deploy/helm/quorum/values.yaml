image:
  repository: ghcr.io/alveel/quorum
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Name of an existing Secret containing the DB connection string.
# The app reads DATABASE_URL from it. When database.tlsCA.enabled=true,
# set sslmode=verify-full in DATABASE_URL. Do not include sslrootcert=
# in the URL — PGSSLROOTCERT is injected automatically from the mounted cert.
database:
  secretName: quorum-db
  secretKey: DATABASE_URL
  tlsCA:
    enabled: false
    secretName: ""  # Secret with key: ca.crt

ingress:
  type: route          # route | httproute
  host: ""             # required for httproute; optional for route (OpenShift assigns one)
  # httproute only: reference to an existing Gateway
  gatewayRef:
    name: ""
    namespace: ""
    sectionName: ""    # optional

proxy:
  provider: openshift  # openshift | oidc
  # Shared cookie secret (both providers).
  cookieSecret:
    secretName: quorum-cookie
    secretKey: cookie-secret
  openshift:
    image: registry.access.redhat.com/openshift4/ose-oauth-proxy:v4.12.0
  oidc:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
    issuerURL: ""
    clientID: ""
    clientSecret:
      secretName: ""
      secretKey: client-secret
    emailDomain: "*"

# OpenShift groups whose members are granted admin in the app.
admin:
  groups: []

team:
  size: 15

threshold:
  minPresentDefault: 8

resources:
  app:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  proxy:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
