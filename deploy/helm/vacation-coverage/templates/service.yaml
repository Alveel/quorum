apiVersion: v1
kind: Service
metadata:
  name: {{ include "vacation-coverage.fullname" . }}
  labels:
    {{- include "vacation-coverage.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: {{ .Values.oauthProxy.tls.secretName }}
spec:
  selector:
    {{- include "vacation-coverage.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: 443
      targetPort: https
