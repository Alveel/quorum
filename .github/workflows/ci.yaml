name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app:   ${{ steps.filter.outputs.app }}
      chart: ${{ steps.filter.outputs.chart }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '**/*.templ'
              - 'Containerfile'
              - 'Makefile'
              - 'migrations/**'
              - 'web/**'
            chart:
              - 'deploy/helm/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install templ
        run: |
          TEMPL_VERSION=$(grep 'github.com/a-h/templ' go.mod | awk '{print $2}')
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}

      - name: Check templ is up to date
        run: make templ && git diff --exit-code

      - name: Test
        run: make test

      - name: Build
        run: make build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm chart
        run: make helm-lint

  publish-chart:
    needs: [changes, helm-lint]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.chart == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Login to GHCR
        run: helm registry login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Package and push chart
        run: |
          CHART_VERSION=$(grep '^version:' deploy/helm/quorum/Chart.yaml | awk '{print $2}')
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          if helm show chart oci://ghcr.io/${OWNER}/charts/quorum --version "${CHART_VERSION}" > /dev/null 2>&1; then
            echo "Chart version ${CHART_VERSION} already exists. Bump version in Chart.yaml before merging chart changes."
            exit 1
          fi
          helm package deploy/helm/quorum
          helm push quorum-${CHART_VERSION}.tgz oci://ghcr.io/${OWNER}/charts

  build-image:
    needs: [changes, test, lint, helm-lint]
    if: github.ref_type == 'tag' || needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Compute image tags
        id: tags
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            echo "tags=${VERSION} ${VERSION#v}" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
            echo "tags=${BRANCH}-${{ github.sha }} ${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ghcr.io/${{ github.repository }}
          tags: ${{ steps.tags.outputs.tags }}
          containerfiles: |
            ./Containerfile
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Push image
        if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ghcr.io

  commit-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR title follows Conventional Commits
        run: |
          echo "${{ github.event.pull_request.title }}" \
            | grep -qE '^(feat|fix|chore|docs|style|refactor|test|build|ci|perf|revert)(\([^)]+\))?!?: .+' \
            || { echo "PR title must follow Conventional Commits: https://www.conventionalcommits.org"; exit 1; }

