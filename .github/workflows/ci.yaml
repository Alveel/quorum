name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '**/*.templ'
              - 'Containerfile'
              - 'Makefile'
              - 'migrations/**'
              - 'web/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install templ
        run: |
          TEMPL_VERSION=$(grep 'github.com/a-h/templ' go.mod | awk '{print $2}')
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}

      - name: Check templ is up to date
        run: make templ && git diff --exit-code

      - name: Test
        run: make test

      - name: Build
        run: make build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm chart
        run: make helm-lint

  publish-chart:
    needs: [helm-lint]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Login to GHCR
        run: helm registry login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Package and push chart
        run: |
          CHART_VERSION=$(grep '^version:' deploy/helm/quorum/Chart.yaml | awk '{print $2}')
          SHORT_SHA=${GITHUB_SHA::7}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm package deploy/helm/quorum --version "${CHART_VERSION}-${SHORT_SHA}"
          helm push quorum-${CHART_VERSION}-${SHORT_SHA}.tgz oci://ghcr.io/${OWNER}/charts

  build-image:
    needs: [changes, test, lint, helm-lint]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tags
        id: tags
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "tags=${BRANCH}-${{ github.sha }} ${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ghcr.io/${{ github.repository }}
          tags: ${{ steps.tags.outputs.tags }}
          containerfiles: |
            ./Containerfile
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ghcr.io
